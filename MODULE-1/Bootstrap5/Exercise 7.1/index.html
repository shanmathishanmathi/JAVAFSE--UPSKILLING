<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">

        <h1 class="display-1">Display 1 Heading</h1>

        <p class="lead">
            This is a lead paragraph. It stands out from regular text.
        </p>

        <p class="text-muted">
            This is muted text.
        </p>

        <p class="fw-bold">
            This text is bold using Bootstrap.
        </p>

        <p class="fst-italic">
            This text is italic.
        </p>

        <p class="text-primary">
            This text uses the primary color.
        </p>

        <p class="text-success">
            This text uses the success color.
        </p>

    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
