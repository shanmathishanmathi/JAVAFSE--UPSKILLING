<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Column Layout</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Four Equal Columns</h2>

        <div class="row">
            <div class="col-sm-3">
                <div class="border p-3 text-center bg-light">
                    Column 1
                </div>
            </div>

            <div class="col-sm-3">
                <div class="border p-3 text-center bg-light">
                    Column 2
                </div>
            </div>

            <div class="col-sm-3">
                <div class="border p-3 text-center bg-light">
                    Column 3
                </div>
            </div>

            <div class="col-sm-3">
                <div class="border p-3 text-center bg-light">
                    Column 4
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
